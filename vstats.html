    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 所有現有的CSS樣式保持不變 */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 12px; }
        
        body {
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .pair-card { transition: all 0.2s ease; }
        .pair-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        .collapsible-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease;
            overflow: hidden;
        }
        .hidden-content {
            max-height: 0;
            opacity: 0;
            margin-top: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        .show-content {
            max-height: 8000px;
            opacity: 1;
        }

        .panel-control-btn {
            @apply px-3 py-1 text-[10px] font-bold border rounded transition-all hover:bg-gray-50 active:scale-95;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; overflow-x: hidden; }
        
        .is-web-fullscreen { 
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important; 
            width: 100vw !important; 
            height: 100vh !important; 
            z-index: 999 !important; 
            background-color: #000 !important; 
            border-radius: 0 !important;
        }
        
        .toggle-switch { position: relative; display: inline-block; width: 52px; height: 34px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00bfa5; }
        input:checked + .slider:before { transform: translateX(18px); }
        
        #main-graph-area { 
            background-color: #0a0a0a; 
            height: calc(100vh - 128px); 
            width: 100%; 
            position: relative; 
            cursor: grab; 
            border-radius: 1rem; 
            overflow: hidden; 
        }
        #network-canvas { width: 100%; height: 100%; }
        #main-graph-area:active { cursor: grabbing; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #9ca3af; border-radius: 3px; }
        
.side-panel {
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.hidden-panel {
    transform: translateX(100%);
    opacity: 0;
    visibility: hidden;
}

        #reset-zoom { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            background: rgba(255,255,255,0.15); 
            color: white; 
            padding: 8px 16px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 13px; 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .rotate-180 { transform: rotate(180deg); }

        .panel-collapsed {
            width: 260px !important;   
            transition: max-height 0.3s ease-in-out, transform 0.3s ease;
            overflow: hidden; 
        }

        #pie-chart-panel {
            transition: all 0.3s ease-in-out;
        }

        .pie-chart-collapsed {
            transform: translateX(-330px) translateY(170px)  !important;
        }

        .piePanel-collapsed {
            width: 140px !important;
            height: 140px !important;
            padding: 0 !important;
            overflow: hidden;
            background-color: transparent !important;
            border-color: transparent !important;
            box-shadow: none !important;
            transform: translateX(-160px) translateY(55px) scale(0.4) !important;
            transition: all 0.3s ease-in-out;
        }

        .piePanel-collapsed h4,
        .piePanel-collapsed #pie-legend {
            display: none;
        }

        .piePanel-collapsed .flex-col {
            gap: 0 !important;
            justify-content: center;
            height: 100%;
        }

        .piePanel-collapsed.panel-hidden-left {
            transform: translateX(-210px) translateY(55px) scale(0.3) !important;
            pointer-events: none;
        }

        .view-transition {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
        .view-panel {
            display: none;
        }
        .view-panel.active {
            display: flex;
            flex-direction: column;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
        }
        .accordion-content.expanded {
            max-height: 2000px;
        }

        .group-tag-row { cursor: pointer; transition: all 0.2s; }
        .group-tag-row:hover { background-color: #f8fafc; }
 
        .core-container { display: flex; align-items: center; gap: 0.25rem; flex-shrink: 0; }
        .collab-outer-wrapper {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem;
            border-left: 2px solid #e5e7eb; padding-left: 0.75rem; margin-left: 0.5rem; flex: 1;
        }

        .collab-sub-group {
            display: flex; 
            align-items: center; 
            gap: 0.15rem; 
            background: rgba(0, 0, 0, 0.03);
            padding: 2px 4px; 
            border-radius: 999px; 
            border: 1px inset rgba(0, 0, 0, 0.05);
        }

        #table-filter-wrapper { transition: max-height 0.4s ease-in-out, opacity 0.3s; max-height: 500px; overflow: hidden; }
        #table-filter-wrapper.collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        
        .clickable-avatar { cursor: pointer; transition: transform 0.2s; }
        .clickable-avatar:hover { transform: scale(1.2); z-index: 10; }         
        
        .avatar-selected {
            outline: 3px solid;
            border-color: white !important;
            border-style: solid;
            opacity: 1 !important;
            filter: grayscale(0) !important;
            transform: scale(1.1);
            z-index: 10;
        }

        #title-filter-display {
            transition: all 0.3s ease;
        }

        #selected-titles-list button {
            transition: transform 0.2s;
        }

        #selected-titles-list button:hover {
            transform: scale(1.2);
        }
    </style>

                const newCollab = {};
                item.collab.forEach((id, index) => {
                    const key = String.fromCharCode(65 + index);
                    newCollab[key] = [id];
                });
                return { ...item, collab: newCollab };

            return item;

function getMembersFromItem(item) {
    if (!item) return { title: "", titles: [], core: [], others: [], displayGroups: [], all: [] };
    
    const formattedItem = formatCollabToArray(item);
    
    // 獲取標籤：支援單個字串或多個字串陣列

    // 檢查原始項目是否有 title 欄位（可能是字串或陣列）
    else if (item.title) {
        if (Array.isArray(item.title)) {

        } else if (typeof item.title === 'string') {
            // 如果是字串，檢查是否包含逗號分隔的多個標題
            const titleString = item.title.trim();
            if (titleString.includes(',')) {
                // 分割並清除空白
                titles = titleString.split(',').map(t => t.trim()).filter(t => t !== '');
            } else {
                // 單一標題
                titles = [titleString];
            }
        }
    }
    // 檢查格式化項目是否有 titles 陣列
    else if (formattedItem.titles && Array.isArray(formattedItem.titles)) {
        titles = formattedItem.titles;
    }
    // 檢查格式化項目是否有 title 字串
    else if (formattedItem.title && typeof formattedItem.title === 'string') {
        const titleString = formattedItem.title.trim();
        if (titleString.includes(',')) {
            titles = titleString.split(',').map(t => t.trim()).filter(t => t !== '');
        } else {
            titles = [formattedItem.title];

    const title = titles.length > 0 ? titles[0] : "";

            displayGroups = Object.values(formattedItem.collab);

            displayGroups = formattedItem.collab.map(id => [id]);
        }
    }
    
    const others = displayGroups.flat();
    const all = Array.from(new Set([...core, ...others]));
    
    return { title, titles, core, others, displayGroups, all };
}

function getColorByValue(val, isSameGroup = true) {
    // 新的停止點設置
    const jpStops = [
        {v: 0, r: 0, g: 255},    // 最小值
        {v: 6, r: 17, g: 187},   // 低於平均
        {v: 9, r: 21, g: 192},   // 接近平均
        {v: 50, r: 126, g: 192}, // 平均值
        {v: 100, r: 255, g: 192} // 最大值
    ];
    
    const enStops = [
        {v: 0, r: 94, g: 94},    // 最小值
        {v: 6, r: 68, g: 68},    // 低於平均
        {v: 9, r: 64, g: 85},    // 接近平均
        {v: 50, r: 64, g: 161},  // 平均值
        {v: 100, r: 64, g: 255}  // 最大值
    ];
    
    const stops = isSameGroup ? jpStops : enStops;
    
    // 邊界處理
    if (val <= stops[0].v) {
        // 最小值時，使用第一個停止點的顏色
        const r = stops[0].r;
        const g = stops[0].g;
        const b = isSameGroup ? 0 : 255; // 藍色通道根據是否同組固定
        
        const rHex = r.toString(16).padStart(2, '0').toUpperCase();
        const gHex = g.toString(16).padStart(2, '0').toUpperCase();
        const bHex = b.toString(16).padStart(2, '0').toUpperCase();
        
        return `#${rHex}${gHex}${bHex}`;
    }
    
    if (val >= stops[stops.length-1].v) {
        // 最大值時，使用最後一個停止點的顏色
        const r = stops[stops.length-1].r;
        const g = stops[stops.length-1].g;
        const b = isSameGroup ? 0 : 255; // 藍色通道根據是否同組固定
        
        const rHex = r.toString(16).padStart(2, '0').toUpperCase();
        const gHex = g.toString(16).padStart(2, '0').toUpperCase();
        const bHex = b.toString(16).padStart(2, '0').toUpperCase();
        
        return `#${rHex}${gHex}${bHex}`;
    }
    
    // 尋找插值區間
    let i = 0;
    while (val > stops[i+1].v) i++;
    
    // 計算插值比例
    const ratio = (val - stops[i].v) / (stops[i+1].v - stops[i].v);
    
    // 紅色和綠色都進行線性插值
    const r = Math.round(stops[i].r + (stops[i+1].r - stops[i].r) * ratio);
    const g = Math.round(stops[i].g + (stops[i+1].g - stops[i].g) * ratio);
    
    // 藍色通道根據是否同組固定
    const b = isSameGroup ? 0 : 255;
    
    const rHex = r.toString(16).padStart(2, '0').toUpperCase();
    const gHex = g.toString(16).padStart(2, '0').toUpperCase();
    const bHex = b.toString(16).padStart(2, '0').toUpperCase();
    
    return `#${rHex}${gHex}${bHex}`;
}

function generateSyncData() {
    const nodes = [];

const filteredData = rawData.filter(item => {
    if (state.activeTitleFilters.size === 0) return true;

    const itemInfo = getMembersFromItem(item);

    return itemInfo.titles.some(t => state.activeTitleFilters.has(t));
});
    
    // 計算節點出現頻率
    const frequencyMap = {};
    ids.forEach(id => frequencyMap[id] = 0);
    filteredData.forEach(item => {
        const members = getMembersFromItem(item).all;
        members.forEach(id => { 
            if (frequencyMap[id] !== undefined) frequencyMap[id]++; 
        });
    });
    
    // 創建節點
    ids.forEach(id => {
        const info = roleConfig[id];
        const nodeObj = { 
            id: id, 
            name: info.name, 
            group: info.group, 
            img: info.img, 
            size: frequencyMap[id] 
        };
        nodes.push(nodeObj);
    });
    
    // 第一階段：生成連線數據（不計算顏色）
    const linkCandidates = [];
    
    // 計算連線（基於過濾後的數據）
    for (let iIdx = 0; iIdx < ids.length; iIdx++) {
        const i = ids[iIdx];
        for (let jIdx = iIdx + 1; jIdx < ids.length; jIdx++) {
            const j = ids[jIdx];
            let both = 0, onlyI = 0, onlyJ = 0, diffG = 0;
            
            let bothHasG = 0;
            let sameG = 0;

            // 使用過濾後的數據
            filteredData.forEach(item => {
                const members = getMembersFromItem(item).all;
                const inI = members.includes(i), inJ = members.includes(j);
                if (inI && inJ) {
                    both++;
                    const groupsI = findGroupName(item, i);
                    const groupsJ = findGroupName(item, j);
                    
                    if (groupsI.length > 0 && groupsJ.length > 0) {
                        bothHasG++;
                        const commonGroups = groupsI.filter(g => groupsJ.includes(g));
                        if (commonGroups.length > 0) {
                            sameG++;
                        } else {
                            diffG++;
                        }
                    }
                } else if (inI && !inJ) onlyI++;
                else if (!inI && inJ) onlyJ++;
            });

            const any = both + onlyI + onlyJ;
            if (any === 0) continue;

            const commonCount = both - diffG;

            if (commonCount > 0) {
                const valNum = Math.round(((commonCount/(onlyI+both))+(commonCount/(onlyJ+both))) * 50);
                const opacityNum = Math.min((((commonCount/(onlyI+both))+(commonCount/(onlyJ+both))) * 0.75), 1.0);
                
                // 儲存候選連線數據
                linkCandidates.push({
                    source: i, 
                    target: j, 
                    valNum: valNum,
                    opacity: Number(opacityNum.toFixed(2)), 
                    width: commonCount,
                    sameGroup: roleConfig[i].group === roleConfig[j].group,
                    rawOpacity: opacityNum // 保存原始 opacity 用於統計
                });
            }
        }
    }
    
// 第二階段：計算透明度統計數據
if (linkCandidates.length > 0) {
    const opacities = linkCandidates.map(l => l.rawOpacity);
    const opacityMax = Math.max(...opacities);
    
    // 第三階段：生成最終連線（使用統計數據計算顏色）
    linkCandidates.forEach(candidate => {
        // 計算基於 opacity 最大值映射到 0-100 的範圍
        let mappedVal;
        
        // 處理邊界情況：如果最大值為0
        if (opacityMax === 0) {
            mappedVal = 0; // 所有值都映射為0
        } else {
            // 將 opacity 線性映射到 [0, 100] 範圍，最大值對應100
            mappedVal = (candidate.rawOpacity / opacityMax) * 100;
        }
        
        // 確保 mappedVal 在 [0, 100] 範圍內
        const clampedVal = Math.max(0, Math.min(100, mappedVal));
        
        // 使用修改後的 getColorByValue 函數
        const color = getColorByValue(clampedVal, candidate.sameGroup);
        
        links.push({
            source: candidate.source, 
            target: candidate.target, 
            value: candidate.valNum,
            opacity: candidate.opacity, 
            width: candidate.width, 
            color: color
        });
    });
}
    
    return { nodes, links };
}

        function getNeighborData() {
            if (!currentSelectedNode) return null;

            graphData.links.forEach(link => {

                const tId = link.target.id || link.target;
                if (sId === currentSelectedNode.id) neighborMap.set(tId, link.width || 1);

        function resize() {
            const mainArea = document.getElementById('main-graph-area');
            const canvas = document.getElementById('network-canvas');
            if (!mainArea || !canvas) return;
            
            width = mainArea.clientWidth;
            height = mainArea.clientHeight;
            const ratio = window.devicePixelRatio || 1;
            
            canvas.width = width * ratio;
            canvas.height = height * ratio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            const ctx = canvas.getContext('2d');
            ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
            
            if (simulation) {
                simulation.force("center", d3.forceCenter(width / 2, height / 2));
                simulation.alpha(0.3).restart();
            }
        }

        function updateData() {
            const nodeIds = new Set(fullData.nodes
                .filter(n => state.activeGroups.has(n.group))
                .map(n => n.id));
            
            graphData.nodes = fullData.nodes.filter(n => nodeIds.has(n.id));
            graphData.links = fullData.links.filter(l => {
                const s = l.source.id || l.source;
                const t = l.target.id || l.target;
                return nodeIds.has(s) && nodeIds.has(t);
            });
            
            if (currentSelectedNode && !state.activeGroups.has(currentSelectedNode.group)) {
                currentSelectedNode = null;
                hideDetailPanel();
            } else if (currentSelectedNode) {
                showDetailPanel(currentSelectedNode);
            }
        }

        function restartSimulation() {
            if (!simulation) return;
            simulation.nodes(graphData.nodes);
            simulation.force("link").links(graphData.links);
            simulation.alpha(1).restart();
        }

        function getNodeRadius(d) { 
            return 12 + Math.sqrt(d.size) * 3; 
        }

        function dragSubject(event) {
            const canvas = document.getElementById('network-canvas');
            const [px, py] = d3.pointer(event, canvas);
            const inv = transform.invert([px, py]);
            return simulation.find(inv[0], inv[1], 40);
        }

        function dragStarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            const canvas = document.getElementById('network-canvas');
            const [px, py] = d3.pointer(event, canvas);
            const inv = transform.invert([px, py]);
            event.subject.fx = inv[0];
            event.subject.fy = inv[1];
        }

        function dragEnded(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        function render() {
            const canvas = document.getElementById('network-canvas');
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            
            ctx.clearRect(0, 0, width, height);
            ctx.save();
            ctx.translate(transform.x, transform.y);
            ctx.scale(transform.k, transform.k);
            
            const neighborMap = getNeighborData();
            const focusSet = neighborMap ? new Set(neighborMap.keys()) : null;
            
            // 渲染連線
            graphData.links.forEach(link => {
                const sId = link.source.id || link.source;
                const tId = link.target.id || link.target;
                const isSelected = currentSelectedNode && 
                    (sId === currentSelectedNode.id || tId === currentSelectedNode.id);
                
                ctx.beginPath();
                ctx.moveTo(link.source.x, link.source.y);
                ctx.lineTo(link.target.x, link.target.y);
                ctx.lineWidth = link.width || 1;
                ctx.strokeStyle = isSelected ? "#FFFFFF" : (link.color || "#444");
                
                if (state.isFocusModeEnabled && currentSelectedNode) {

                } else {
                    ctx.globalAlpha = (link.opacity || 0.4);
                }
                ctx.stroke();

            // 渲染節點
            graphData.nodes.forEach(node => {
                const r = getNodeRadius(node);
                const isSelected = currentSelectedNode && node.id === currentSelectedNode.id;
                const linkWidth = neighborMap ? neighborMap.get(node.id) : undefined;
                const isNeighbor = focusSet?.has(node.id) && !isSelected;
                const isDimmed = state.isFocusModeEnabled && currentSelectedNode && !focusSet?.has(node.id);
                const groupColor = groupColorMap[node.group] || "#7f7f7f";
                
                ctx.save();
                ctx.globalAlpha = (isSelected ? 1 : isDimmed ? 0 : 1);
                
                if (isSelected) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = groupColor;
                }
                
                // 繪製節點背景
                ctx.beginPath();
                ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
                ctx.fillStyle = "#1a1a1a";
                ctx.fill();
                
                // 繪製邊框
                ctx.lineWidth = !currentSelectedNode 
                    ? 15
                    : isSelected 
                    ? 15
                    : (isNeighbor ? Math.min(linkWidth || 0, 15) : 0);
                
                ctx.strokeStyle = isSelected ? groupColor : "#FFFFFF";
                ctx.stroke();
                
                // 繪製頭像
                const img = imageCache.get(node.id);
                if (img?.complete) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
                    ctx.clip();
                    ctx.drawImage(img, node.x - r, node.y - r, r * 2, r * 2);
                    ctx.restore();
                }
                
                // 繪製標籤
                if (transform.k > 0.4 && state.nodesVisible) {
                    ctx.font = `bold ${16}px Noto Sans JP`;
                    ctx.globalAlpha = (!isDimmed || isSelected) ? 1.0 : 0;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "top";
                    ctx.strokeStyle = isSelected ? groupColor : isDimmed ? "#000" : groupColor;
                    ctx.lineWidth = 3;
                    ctx.strokeText(node.name, node.x, node.y + r + 8);
                    ctx.fillStyle = isSelected ? "#ffffff" : isDimmed ? "#000" : "#ffffff";
                    ctx.fillText(node.name, node.x, node.y + r + 8);
                }
                
                ctx.restore();
            });
            
            ctx.restore();
        }

        function drawPieChart(stats) {
            const pieCanvas = document.getElementById('group-pie-canvas');
            const legend = document.getElementById('pie-legend');
            if (!pieCanvas || !legend) return;
            
            const pCtx = pieCanvas.getContext('2d');
            pCtx.clearRect(0, 0, pieCanvas.width, pieCanvas.height);
            legend.innerHTML = '';
            
            const total = Object.values(stats).reduce((a, b) => a + b, 0);
            if (total === 0) {
                legend.innerHTML = '<div class="text-center text-gray-400 py-4 w-full">目前無可視數據</div>';
                return;
            }
            
            const sortedEntries = Object.entries(stats).sort((a, b) => b[1] - a[1]);
            let startAngle = -Math.PI / 2;
            const centerX = pieCanvas.width / 2;
            const centerY = pieCanvas.height / 2;
            const radius = 60;
            
            sortedEntries.forEach(([group, count]) => {
                const sliceAngle = (count / total) * 2 * Math.PI;
                const color = groupColorMap[group] || '#ccc';
                
                pCtx.beginPath();
                pCtx.moveTo(centerX, centerY);

function updateTitleFilterDisplay() {
    const titleFilterDisplay = document.getElementById('title-filter-display');
    const selectedTitlesList = document.getElementById('selected-titles-list');
    
    if (!titleFilterDisplay || !selectedTitlesList) return;
    
    if (state.activeTitleFilters.size > 0) {
        titleFilterDisplay.classList.remove('hidden');
        selectedTitlesList.innerHTML = '';
        
        state.activeTitleFilters.forEach(title => {
            const container = document.createElement('div');
            container.className = 'inline-flex items-center bg-gradient-to-r from-indigo-50 to-purple-50 border border-indigo-200 rounded-full overflow-hidden shadow-sm mr-1 mb-1';
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'text-indigo-700 text-[10px] font-bold px-2 py-1 whitespace-nowrap';
            titleSpan.textContent = title;
            
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'bg-indigo-200 text-indigo-700 hover:bg-red-100 hover:text-red-600 transition-colors px-1.5 py-1 text-[10px] font-bold border-l border-indigo-300';
            removeBtn.innerHTML = '<i class="fa-solid fa-times"></i>';
            removeBtn.title = `取消「${title}」過濾`;
            
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                removeSingleTitleFilter(title);
            });
            
            container.addEventListener('mouseenter', () => {
                container.classList.add('shadow-md', 'border-indigo-300');
                container.classList.remove('shadow-sm');
            });
            
            container.addEventListener('mouseleave', () => {
                container.classList.remove('shadow-md', 'border-indigo-300');
                container.classList.add('shadow-sm');
            });
            
            container.appendChild(titleSpan);
            container.appendChild(removeBtn);
            selectedTitlesList.appendChild(container);
        });
    } else {
        titleFilterDisplay.classList.add('hidden');
        selectedTitlesList.innerHTML = '';
    }
}

function filterByTitle(title) {
    if (state.activeTitleFilters.has(title)) {
        state.activeTitleFilters.delete(title);
    } else {
        state.activeTitleFilters.add(title);
    }
    
    updateTitleFilterBadge();
    updateTitleFilterDisplay();
    
    if (state.currentView === 'graph') {
        // 重新生成圖表數據
        fullData = generateSyncData();
        updateData();
        restartSimulation();
        
        // 如果有選中的節點，重新顯示詳細面板以更新數據
        if (currentSelectedNode) {
            // 找到更新後的節點數據
            const updatedNode = graphData.nodes.find(n => n.id === currentSelectedNode.id);
            if (updatedNode) {
                currentSelectedNode = updatedNode;
                showDetailPanel(updatedNode);
            }
        }
        
        render();
    }
    
    if (state.currentView === 'table') {
        renderTableView();
    }
}

function removeSingleTitleFilter(title) {
    if (state.activeTitleFilters.has(title)) {

// 更新 switchView 函數中的圖表部分
function switchView(view) {
    state.currentView = view;
    
    let savedNodeData = null;
    if (currentSelectedNode) {
        savedNodeData = {
            id: currentSelectedNode.id,
            name: currentSelectedNode.name,
            group: currentSelectedNode.group,
            img: currentSelectedNode.img,
            size: currentSelectedNode.size
        };
    }
    
    document.querySelectorAll('.view-panel').forEach(p => {
        p.classList.toggle('active', p.id === `panel-${view}`);
    });
    
    const btnGraph = document.getElementById('switch-graph');
    const btnTable = document.getElementById('switch-table');
    
    if (view === 'graph') {
        btnGraph.className = "toggle-btn active px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 bg-indigo-600 text-white shadow-lg";
        btnTable.className = "toggle-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 text-slate-600";
        
        // 重新生成圖表數據（包含當前標題過濾）
        fullData = generateSyncData();
        updateData();
        restartSimulation();
        
        if (savedNodeData) {
            const restoredNode = graphData.nodes.find(n => n.id === savedNodeData.id);
            if (restoredNode) {
                // 更新節點數據，確保包含最新的 size 等信息
                Object.assign(restoredNode, {
                    name: savedNodeData.name,
                    group: savedNodeData.group,
                    img: savedNodeData.img,
                    // 使用新計算的 size
                    size: restoredNode.size
                });
                currentSelectedNode = restoredNode;
                
                setTimeout(() => {
                    showDetailPanel(currentSelectedNode);
                    const detailPanelEl = document.getElementById('node-detail-panel');
                    const piePanelEl = document.getElementById('pie-chart-panel');
                    if (detailPanelEl) {
                        detailPanelEl.classList.remove('hidden-panel');
                    }
                    if (piePanelEl) {
                        piePanelEl.classList.remove('hidden-panel');
                    }
                }, 100);
            }
        }
        
        setTimeout(() => { 
            resize(); 
            render(); 
        }, 100);
    } else {
        btnTable.className = "toggle-btn active px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 bg-indigo-600 text-white shadow-lg";
        btnGraph.className = "toggle-btn px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 text-slate-600";
        
        const detailPanelEl = document.getElementById('node-detail-panel');
        const piePanelEl = document.getElementById('pie-chart-panel');
        if (detailPanelEl) {
            detailPanelEl.classList.add('hidden-panel');
        }
        if (piePanelEl) {
            piePanelEl.classList.add('hidden-panel');
        }
        
        renderTableView();
    }
    updateTitleFilterDisplay();
}

        function init() {

            document.getElementById('btn-mode-other').addEventListener('click', () => setModeFilter('other'));
            document.getElementById('btn-mode-any').addEventListener('click', () => setModeFilter('any'));

            updateData();
            initFilters();
            
            // 初始化模擬
            const canvas = document.getElementById('network-canvas');

            const currentNodes = fullData.nodes;
            const currentLinks = fullData.links;


            simulation = d3.forceSimulation(currentNodes)
                .force("link", d3.forceLink(currentLinks)
                    .id(d => d.id)
                    .distance(link => {
                        // 透明度越高，距离越近
                        const width = link.width || 1;
                        return 100 - (width * 1); // 透明度高时距离更近（100-150范围）
                    })
                    .strength(link => {
                        // 透明度越高，强度越大
                        const opacity = link.opacity || 0.01;
                        return opacity*0.5 ; // 0-0.1的范围
                    }))

                .force("charge", d3.forceManyBody().strength(-3000))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => getNodeRadius(d) + 10));
            
            const zoom = d3.zoom()
                .scaleExtent([0.1, 5])
                .filter(event => {
                    if (event.type === 'wheel') return true;
                    if (event.type === 'mousedown' && !event.button && !event.ctrlKey) {
                        const [px, py] = d3.pointer(event, canvas);
                        const inv = transform.invert([px, py]);
                        const node = simulation.find(inv[0], inv[1], 40);
                        return !node;
                    }
                    return false;
                })
                .on("zoom", (event) => {
                    transform = event.transform;
                    render();
                });
            
            const drag = d3.drag()
                .subject(dragSubject)
                .on("start", dragStarted)
                .on("drag", dragged)
                .on("end", dragEnded);
            
            d3.select(canvas)
                .call(zoom)
                .on("dblclick.zoom", null)
                .call(drag)
                .on("click", (event) => {
                    const [x, y] = d3.pointer(event);
                    const inverted = transform.invert([x, y]);
                    const node = simulation.find(inverted[0], inverted[1], 40);
                    if (node) {
                        handleNodeClick(node);
                    }
                });

// 调试函数：显示连线 opacity 信息
function debugLinkOpacity(links) {
    console.log("=== 连线透明度调试信息 ===");
    
    // 计算统计信息
    const opacities = links.map(l => l.opacity);
    const min = Math.min(...opacities);
    const max = Math.max(...opacities);
    const avg = opacities.reduce((a, b) => a + b, 0) / opacities.length;
    
    console.log(`连线数量: ${links.length}`);
    console.log(`Opacity 范围: ${min} - ${max}`);
    console.log(`Opacity 平均值: ${avg.toFixed(3)}`);
    
    // 分组显示
    const groups = {
        '高 (0.6-1.0)': links.filter(l => l.opacity >= 0.6).length,
        '中 (0.3-0.6)': links.filter(l => l.opacity >= 0.3 && l.opacity < 0.6).length,
        '低 (0.1-0.3)': links.filter(l => l.opacity >= 0.1 && l.opacity < 0.3).length,
        '低 (0-0.1)': links.filter(l => l.opacity < 0.1).length
    };
    
    console.log("分组统计:", groups);
    
    // 显示具体连线的信息
    console.log("前5条连线详细信息:");
    links.slice(0, 5).forEach((link, i) => {
        console.log(`${i+1}. ${link.source} ↔ ${link.target}: opacity=${link.opacity}, value=${link.value}, width=${link.width}`);
    });
}

            simulation.on("tick", render);
