<head>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- 引入 Chart.js & Zoom 插件 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <style>
        /* 基礎設定：禁止頁面捲動，強制撐滿視窗 */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }

        .chart-wrapper { 
            width: 100%; height: 100%; background: white; padding: 20px; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; box-sizing: border-box;
        }

        /* 控制欄 */
        .controls { 
            flex-shrink: 0; display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 15px; 
            background: #f8f9fa; padding: 12px 20px; border-radius: 12px; border: 1px solid #e9ecef; 
        }

        button { padding: 8px 14px; border: 1px solid #dee2e6; border-radius: 6px; background-color: white; color: #495057; cursor: pointer; font-weight: 500; font-size: 13px; transition: all 0.2s; user-select: none; }
        button.active { background-color: #007bff; color: white; border-color: #007bff; }
        button:hover:not(.active) { background-color: #e9ecef; }
        
        .slider-container { flex-grow: 1; display: flex; align-items: center; gap: 10px; min-width: 250px; }
        input[type="range"] { flex-grow: 1; cursor: pointer; }
        .time-display { font-family: monospace; font-weight: bold; color: #495057; min-width: 120px; text-align: right; font-size: 14px; }
 
        /* 中間區塊 */
        .chart-main-layout { display: flex; width: 100%; flex: 1; min-height: 0; align-items: stretch; }
        .chart-container { flex: 1; position: relative; cursor: grab; min-width: 0; }

        /* X/Y 軸拉條 */
        .range-slider-wrapper { flex-shrink: 0; margin-top: 5px; padding: 0 15px 0 65px; position: relative; width: calc(100% - 80px); height: 40px; }
        .range-slider-track { height: 6px; background: #e9ecef; border-radius: 3px; position: relative; top: 5px; }
        .range-slider-active { height: 100%; background: #007bff; position: absolute; border-radius: 3px; cursor: grab; }

        .y-range-slider-wrapper { position: relative; width: 35px; margin-right: 5px; height: 100%; }
        .y-range-slider-track { width: 6px; height: calc(100% - 32px); background: #e9ecef; border-radius: 3px; position: absolute; right: 5px; top: 5px; }
        .y-range-slider-active { width: 100%; background: #007bff; position: absolute; border-radius: 3px; cursor: grab; }

        .range-thumb { width: 20px; height: 20px; background: white; border: 2px solid #007bff; border-radius: 50%; position: absolute; cursor: pointer; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .x-thumb { top: 50%; transform: translate(-50%, -50%); cursor: ew-resize; }
        .y-thumb { left: 50%; transform: translate(-50%, 50%); cursor: ns-resize; }
        .range-label { position: absolute; top: 25px; font-size: 12px; font-weight: bold; color: #007bff; white-space: nowrap; transform: translateX(-50%); background: #e7f3ff; padding: 2px 6px; border-radius: 4px; pointer-events: none; }

/* 側邊欄與關閉按鈕 (改為 Flex 佈局以固定表頭，內部列表滾動) */
        .sidebar-panel { 
            position: absolute; top: 75px; z-index: 1001; background: rgba(255, 255, 255, 0.98); 
            border: 1px solid #ddd; border-radius: 12px; box-shadow: -5px 5px 15px rgba(0,0,0,0.1); 
            padding: 15px; display: none; max-height: 400px; 
            flex-direction: column; box-sizing: border-box; overflow: hidden;
        }
        .sidebar-panel.open { display: flex; } /* 展開時使用 flex */
        .sidebar-header { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sidebar-header h4 { margin: 0; font-size: 14px; }
        .close-btn { background: none; border: none; font-size: 16px; color: #888; cursor: pointer; padding: 0 4px; line-height: 1; }
        .close-btn:hover { color: #333; }

        #member-sidebar { right: 25px; width: 260px; }
        #group-sidebar { right: 130px; width: 200px; } 
        
        /* 讓成員清單與群組清單獨立滾動，不影響上方標題 */
        #member-list, #group-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        #member-list::-webkit-scrollbar, #group-list::-webkit-scrollbar { width: 6px; }
        #member-list::-webkit-scrollbar-thumb, #group-list::-webkit-scrollbar-thumb { background: #cbd0d6; border-radius: 3px; }
        
        /* 側邊欄列表項目 */
        .member-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; margin-bottom: 4px; }
        .member-item.hidden-member { opacity: 0.4; filter: grayscale(100%); }
        .focus-toggle-area { display: flex; align-items: center; gap: 10px; flex-grow: 1; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: background 0.1s; }
        .focus-toggle-area:hover { background: #f0f2f5; }
        .member-avatar-mini { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; }

        /* Tooltip 樣式 (保留原本的，不動) */
        #custom-tooltip { position: absolute; background: rgba(255, 255, 255, 0.98); border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); pointer-events: none; opacity: 0; z-index: 100; min-width: 240px; border: 1px solid #eee; transition: opacity 0.1s ease; }
        .tooltip-header { background: #f8f9fa; font-weight: bold; padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
        .tooltip-row { display: flex; align-items: center; padding: 6px 12px; border-left: 4px solid transparent; }
        .tooltip-avatar { width: 24px; height: 24px; border-radius: 50%; margin-right: 10px; }
        .tooltip-value { font-weight: bold; font-size: 14px; margin-left: auto; }
        .tooltip-name { font-size: 11px; color: #6c757d; flex-grow: 1; }
        .tooltip-list-container { max-height: 520px; overflow-y: auto; }
        .tooltip-list-container::-webkit-scrollbar { width: 6px; }
        .tooltip-list-container::-webkit-scrollbar-thumb { background: #cbd0d6; border-radius: 3px; }

        /* ✨ 解決 Google 圖示載入時會顯示英文單字的問題 (改用 Unicode) */
        .g-icon {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 20px; /* 稍微放大一點點，因為現在只有圖示沒有文字 */
            line-height: 1;
            display: inline-block;
            text-transform: none;
            -webkit-font-smoothing: antialiased;
        }
        /* 注入燈泡的專屬代碼 */
        .g-icon-lightbulb::before {
            content: "\e0f0";
        }
        /* 在原本的 .g-icon-lightbulb::before 下方加入這行 */
        .g-icon-refresh::before {
            content: "\e5d5"; /* Google Icons 的 "refresh" 代碼 */
        }

 
/* 統一風格 */
#resetZoom, #clearFocusBtn {
    background-color: #6c757d; 
    color: white; 
    border: none; 
    border-radius: 6px;
    padding: 8px 12px; 
    cursor: pointer;
    transition: all 0.2s;
    display: flex; /* 預設改為 flex */
    align-items: center;
    justify-content: center;
}

#resetZoom:hover, #clearFocusBtn:hover {
    background-color: #5a6268;
}

/* 高光開啟狀態 (紅色) */
#clearFocusBtn.is-active {
    background-color: #dc3545 !important;
}

/* 預設隱藏與否，透過 Class 控制會比 display:none 更穩健 */
#clearFocusBtn { opacity: 0.5; pointer-events: none; }
#clearFocusBtn.is-active { opacity: 1; pointer-events: auto; }

        /* 讓圖示看起來大小一致 */
        .g-icon {

            font-weight: normal;
            font-style: normal;
            font-size: 20px; 
            line-height: 1;
            display: inline-block;
            text-transform: none;
            -webkit-font-smoothing: antialiased;

                    if (lastIndex === -1) return;
                    
                    const point = meta.data[lastIndex];
                    if (!point || isNaN(point.x) || isNaN(point.y)) return;
                    if (point.x < chart.chartArea.left || point.x > chart.chartArea.right || point.y < chart.chartArea.top || point.y > chart.chartArea.bottom) return;

                    const isFocused = hasFocus ? chart._focusedIds.has(dataset.id) : false;
                    const avatarData = { dataset, point, isFocused };

                    if (hasFocus && !isFocused) {
                        normalAvatars.push(avatarData);
                    } else {
                        focusedAvatars.push(avatarData); // 被選中的，或是沒觸發高光模式時
                    }
                });

                const drawAvatar = ({dataset, point, isFocused}) => {
                    const img = avatarImages[dataset.id];
                    const size = 32;

                    ctx.save();
                    if (hasFocus && !isFocused) ctx.globalAlpha = 0.2; // 未選中變更淡
                    if (isFocused) { 
                        ctx.shadowBlur = 15; 
                        ctx.shadowColor = dataset.originalColor; 
                    }
                    
                    ctx.beginPath(); 
                    ctx.arc(point.x, point.y, size / 2, 0, Math.PI * 2); 
                    ctx.closePath();
                    
                    ctx.strokeStyle = dataset.borderColor; 
                    ctx.lineWidth = isFocused ? 4 : 2; 
                    ctx.stroke(); 
                    ctx.clip();
                    
                    if (img && img.complete) ctx.drawImage(img, point.x - size/2, point.y - size/2, size, size);
                    ctx.restore();
                    
                    chart._avatarRects.push({ datasetId: dataset.id, x: point.x, y: point.y, radius: size / 2 });
                };

                // 先畫普通(或被淡化)的，再畫高光聚焦的，確保高光在最上方
                normalAvatars.forEach(drawAvatar);
                focusedAvatars.forEach(drawAvatar);
            }
        };

        const allGroups = [...new Set(CHANNEL_REGISTRY.map(ch => ch.group))];
        let activeGroups = [...allGroups];
        let colorMode = 'personal';

        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.startsWith('rgba')) return hex.replace(/[\d\.]+\)$/g, `${alpha})`);
            if (hex.length === 7) { r = parseInt(hex.slice(1, 3), 16); g = parseInt(hex.slice(3, 5), 16); b = parseInt(hex.slice(5, 7), 16); }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function formatYAxisLabel(value) {
            if (value === 0) return '0';
            let w = value / 10000;
            return Number.isInteger(w) ? w + '萬' : w.toFixed(1) + '萬'; 
        }

        function getFilteredDatasets() {
            const currentIdx = parseInt(document.getElementById('progressRange').value);
            const datasets = [];

            CHANNEL_REGISTRY.filter(ch => activeGroups.includes(ch.group)).forEach(ch => {
                const color = colorMode === 'personal' ? ch.color : (GROUP_COLORS[ch.group] || "#999");
                const markers = EVENT_MARKERS[ch.id] || [];
                const markerIndices = markers.map(m => timeToIndex[`${m[0]}_${m[1]}`]);
                const baseData = processedStatsData[ch.id].slice(0, currentIdx + 1);

                datasets.push({
                    id: ch.id, 
                    label: ch.name,
                    data: baseData,
                    hidden: manuallyHiddenIds.has(ch.id), 
                    originalColor: color,
                    borderColor: color,
                    backgroundColor: color,
                    borderWidth: 2, 
                    tension: 0.1, 
                    pointRadius: (ctx) => {
                        if (ctx.dataIndex === undefined) return 0;
                        const ds = ctx.dataset;
                        const currentIdx = parseInt(document.getElementById('progressRange').value);
                        if (ds._markerIndices && ds._markerIndices.includes(ctx.dataIndex) && ctx.dataIndex <= currentIdx) {
                            const hasFocus = myChart._focusedIds && myChart._focusedIds.size > 0;
                            const isSelected = !hasFocus || myChart._focusedIds.has(ds.id);
                            return isSelected ? 8 : 4;
                        }
                        return 0;
                    },
                    pointStyle: fullTimelineLabels.map((_, i) => markerIndices.includes(i) ? 'triangle' : 'circle'),
                    pointBackgroundColor: '#fff',
                    pointBorderColor: color,
                    pointBorderWidth: 2,
                    customAvatar: ch.img, 
                    spanGaps: false,
                    _markerIndices: markerIndices,
                    _isMain: true
                });
            });
            return datasets;
        }

        const ctxChart = document.getElementById('myChart').getContext('2d');
        const tooltipEl = document.getElementById('custom-tooltip');

        function syncSlidersUIOnly(chart) {
            const x = chart.scales.x; const y = chart.scales.y;
            let xMinPct = Math.max(0, (x.min / (totalHours - 1)) * 100);
            let xMaxPct = Math.min(100, (x.max / (totalHours - 1)) * 100);
            document.getElementById('thumbLeft').style.left = xMinPct + '%';
            document.getElementById('thumbRight').style.left = xMaxPct + '%';
            document.getElementById('rangeActive').style.left = xMinPct + '%';
            document.getElementById('rangeActive').style.width = (xMaxPct - xMinPct) + '%';
            
            const leftLabelIdx = Math.max(0, Math.round(x.min));
            const rightLabelIdx = Math.min(totalHours-1, Math.round(x.max));
            document.getElementById('labelLeft').innerText = fullTimelineLabels[leftLabelIdx].split(" ")[1]; 
            document.getElementById('labelRight').innerText = fullTimelineLabels[rightLabelIdx].split(" ")[1];

            let yMinPct = Math.max(0, ((y.min - globalYMin) / (globalYMax - globalYMin)) * 100);
            let yMaxPct = Math.min(100, ((y.max - globalYMin) / (globalYMax - globalYMin)) * 100);
            document.getElementById('yThumbBottom').style.bottom = yMinPct + '%';
            document.getElementById('yThumbTop').style.bottom = yMaxPct + '%';
            document.getElementById('yRangeActive').style.bottom = yMinPct + '%';
            document.getElementById('yRangeActive').style.height = (yMaxPct - yMinPct) + '%';
        }

        const myChart = new Chart(ctxChart, {
            type: 'line',
            plugins: [auxLinesPlugin, endAvatarPlugin, verticalHoverLinePlugin],
            data: { labels: fullTimelineLabels, datasets: getFilteredDatasets() },
            options: { 
                layout: { padding: { top: 15, bottom: 15, left: 10, right: 10 } },
                responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                interaction: { mode: 'index', intersect: false },
                onClick: (e, elements, chart) => {
                    let clickedId = null;
                    if (chart._avatarRects) {
                        // 反向遍歷以點中上層頭像
                        for (let i = chart._avatarRects.length - 1; i >= 0; i--) {
                            const rect = chart._avatarRects[i];
                            if (Math.sqrt((e.x - rect.x) ** 2 + (e.y - rect.y) ** 2) <= rect.radius) { 
                                clickedId = rect.datasetId; break; 
                            }
                        }
                    }
                    
                    if (!chart._focusedIds) chart._focusedIds = new Set();
                    
                    if (clickedId !== null) {
                        // 保留點擊頭像可以「切換/取消」該成員的功能
                        if (chart._focusedIds.has(clickedId)) chart._focusedIds.delete(clickedId);
                        else chart._focusedIds.add(clickedId);
                    } 
                    // ✨ 這裡已經移除了 else { chart._focusedIds.clear(); } 
                    // 這樣點擊畫布空白處，就不會清空高光了！

                    applyFocusStyles(chart);
                    updateFocusBtnUI(); // ✨ 新增這行

                    if (document.getElementById('member-sidebar').classList.contains('open')) { 
                        updateMemberSidebar(); 
                    }

                    // 判斷是否顯示右上角「關閉高光」按鈕
                    // 原本是 'block' : 'none'，改成 'flex' : 'none'
                    document.getElementById('clearFocusBtn').style.display = 
                    (chart._focusedIds && chart._focusedIds.size > 0) ? 'flex' : 'none';
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false, external: handleTooltip },
                    zoom: {
                        pan: { 
                            enabled: true, 
                            mode: 'xy', 
                            modifierKey: null, 
                            onPan: ({chart}) => syncSlidersUIOnly(chart) 
                        },
                        zoom: { 
                            wheel: { enabled: false }, 
                            pinch: { enabled: true }, 
                            mode: 'xy', 
                            onZoom: ({chart}) => syncSlidersUIOnly(chart) 
                        },
                        // ✨ 關鍵：明確限制 Y 軸的平移範圍
                        limits: {
                            y: { 
                                min: globalYMin, 
                                max: globalYMax, 
                                minRange: 20000 
                            },
                            x: { 
                                min: 0, 
                                max: totalHours - 1 
                            }
                        }
                    }
                },
                scales: {
                    x: { 
                        min: 0, max: totalHours - 1,
                        grid: { 
                            display: true, drawTicks: true,
                            color: (ctx) => {
                                if (!Number.isInteger(ctx.tick.value)) return 'transparent';
                                const l = fullTimelineLabels[ctx.tick.value];
                                return (l && l.includes("00:00")) ? 'rgba(0,0,0,0.15)' : 'transparent'; 
                            },
                            tickColor: (ctx) => {
                                if (!Number.isInteger(ctx.tick.value)) return 'transparent';
                                const l = fullTimelineLabels[ctx.tick.value];
                                return (l && (l.includes("00:00") || l.includes("12:00"))) ? 'rgba(0,0,0,0.3)' : 'transparent';
                            }
                        },
                        ticks: {
                            maxRotation: 0, autoSkip: false, 
                            callback: function(val) { 
                                if (!Number.isInteger(val)) return null;
                                const label = fullTimelineLabels[val];
                                if (!label) return null;
                                if (label.includes("00:00")) return label.split(" ")[1]; 
                                if (label.includes("12:00")) return ""; 
                                return null;
                            },
                            font: { weight: 'bold', size: 11 }
                        },
                        afterBuildTicks: function(scaleInstance) {
                            const range = scaleInstance.max - scaleInstance.min;
                            const newTicks = [];
                            const start = Math.max(0, Math.ceil(scaleInstance.min));
                            const end = Math.min(totalHours - 1, Math.floor(scaleInstance.max));
                            let dayStep = 1, showHalfDay = false;
                            
                            if (range > 360) dayStep = 3; 
                            else if (range > 216) dayStep = 2; 
                            else if (range >= 120) dayStep = 1; 
                            else { dayStep = 1; showHalfDay = true; }

                            for (let i = start; i <= end; i++) {
                                const label = fullTimelineLabels[i];
                                if (!label) continue;
                                if (label.includes("00:00")) {
                                    const match = label.match(/Day (\d+)/);
                                    if (match && (parseInt(match[1], 10) - 1) % dayStep === 0) newTicks.push({ value: i });
                                } else if (label.includes("12:00") && showHalfDay) {
                                    newTicks.push({ value: i }); 
                                }
                            }
                            scaleInstance.ticks = newTicks;
                        }
                    },
                    y: { 
                        min: globalYMin, max: globalYMax,
                        grid: { color: 'rgba(0,0,0,0.05)' }, 
                        afterFit: function(scaleInstance) { scaleInstance.width = 65; },
                        ticks: { callback: formatYAxisLabel },
                        afterBuildTicks: function(scaleInstance) {
                            const range = scaleInstance.max - scaleInstance.min;
                            let step;
                            if (range >= 640000) step = 200000; 
                            else if (range >= 340000) step = 100000; 
                            else if (range >= 70000) step = 50000;  
                            else step = 10000;  

                            // ✨ 關鍵：平移時必須將刻度「對齊」且「限制」在邊界內
                            // 使用 Math.max/min 確保計算出來的起點和終點絕不會超出範圍
                            const minVal = Math.max(globalYMin, Math.ceil(scaleInstance.min / step) * step);
                            const maxVal = Math.min(globalYMax, Math.floor(scaleInstance.max / step) * step);
                            
                            const ticks = [];
                            for (let i = minVal; i <= maxVal; i += step) {
                                ticks.push({ value: i });
                            }
                            
                            // 修正：確保至少有一個刻度，防止圖表變白
                            if (ticks.length === 0) {
                                ticks.push({ value: globalYMin });
                            }
                            
                            scaleInstance.ticks = ticks;
                        }
                    }
                }
            }
        });

        // ==========================================
        // 3. UI 互動與播放控制
        // ==========================================
        function handleTooltip(context) {
            const { chart, tooltip } = context;
            if (tooltip.opacity === 0) { tooltipEl.style.opacity = 0; return; }
            
            let currentScrollTop = 0;
            const oldContainer = tooltipEl.querySelector('.tooltip-list-container');
            if (oldContainer) { currentScrollTop = oldContainer.scrollTop; }

            if (tooltip.body) {
                const title = tooltip.title[0] || '';
                let html = `<div class="tooltip-header">${title}</div><div class="tooltip-list-container">`;
                
                const validPoints = tooltip.dataPoints.filter(p => p.raw !== null && chart.isDatasetVisible(p.datasetIndex) && chart.data.datasets[p.datasetIndex]._isMain);
                
                validPoints.sort((a, b) => b.raw - a.raw).forEach(point => {
                    const ds = chart.data.datasets[point.datasetIndex];
                    const isFaded = chart._focusedIds && chart._focusedIds.size > 0 && !chart._focusedIds.has(ds.id);
                    html += `<div class="tooltip-row" style="border-left-color: ${ds.originalColor}; opacity: ${isFaded ? 0.3 : 1}">
                        <img src="${ds.customAvatar}" class="tooltip-avatar">
                        <div class="tooltip-name">${ds.label}</div>
                        <div class="tooltip-value">${point.raw.toLocaleString()}</div>
                    </div>`;
                });
                
                html += `</div>`;
                tooltipEl.innerHTML = html;

                const newContainer = tooltipEl.querySelector('.tooltip-list-container');
                if (newContainer) { newContainer.scrollTop = currentScrollTop; }
            }
            
            const { offsetLeft: px, offsetTop: py } = chart.canvas;
            let left = px + tooltip.caretX + 15;
            if (tooltip.caretX > chart.width / 2) left -= (tooltipEl.offsetWidth + 30);
            tooltipEl.style.opacity = 1; tooltipEl.style.left = left + 'px'; tooltipEl.style.top = py + 'px';
        }

        const progressRange = document.getElementById('progressRange');
        progressRange.max = totalHours - 1;

        function updateProgress(val) {
            const idx = parseInt(val);
            progressRange.value = idx;
            document.getElementById('timeLabel').innerText = fullTimelineLabels[idx];

            myChart.data.datasets.forEach(ds => {
                const fullData = processedStatsData[ds.id];
                if (!fullData) return;
                ds.data = fullData.slice(0, idx + 1); 
            });
            
            applyFocusStyles(myChart, false); 
            myChart.update('none'); 
        }

        progressRange.oninput = (e) => updateProgress(e.target.value);

        function applyFocusStyles(chart, shouldUpdate = true) {
            const hasFocus = chart._focusedIds && chart._focusedIds.size > 0;
            
            chart.data.datasets.forEach((ds) => {
                const mainId = ds._isAux ? ds._parentId : ds.id;
                const isSelected = !hasFocus || chart._focusedIds.has(mainId);
                const alpha = isSelected ? 1 : 0.1;
                
                ds.borderColor = hexToRgba(ds.originalColor, alpha);
                ds.backgroundColor = hexToRgba(ds.originalColor, alpha);
                ds.pointBorderColor = hexToRgba(ds.originalColor, alpha);
                // ✨ 修正 Z-Index：被選中的 order=0 (最上層)，未選中 order=999
                ds.order = isSelected ? 0 : 999; 
            });
            
            if (shouldUpdate) { chart.update(); }
        }

        // ====== 播放邏輯 ======
        let isPlaying = false, animationFrameId = null, lastFrameTime = 0;
        const playIntervalMs = 80;

        document.getElementById('playBtn').onclick = function() {
            const btn = this; 
            if (isPlaying) { 
                isPlaying = false;
                cancelAnimationFrame(animationFrameId); 
                btn.innerHTML = "▶ 播放"; 
                btn.style.backgroundColor = "#28a745"; 
            } else {
                if (parseInt(progressRange.value) >= totalHours - 1) progressRange.value = 0; 
                isPlaying = true;
                btn.innerHTML = "⏸ 暫停"; 
                btn.style.backgroundColor = "#ffc107";
                lastFrameTime = performance.now(); 

                function playLoop(timestamp) {
                    if (!isPlaying) return; 
                    if (timestamp - lastFrameTime >= playIntervalMs) {
                        let v = parseInt(progressRange.value);
                        if (v < totalHours - 1) { 
                            updateProgress(v + 1); lastFrameTime = timestamp; 
                        } else { 
                            isPlaying = false; btn.innerHTML = "▶ 播放"; btn.style.backgroundColor = "#28a745"; return; 
                        }
                    }
                    if (isPlaying) animationFrameId = requestAnimationFrame(playLoop);
                }
                animationFrameId = requestAnimationFrame(playLoop);
            }
        };

function updateFocusBtnUI() {
    const btn = document.getElementById('clearFocusBtn');
    const hasFocus = myChart._focusedIds && myChart._focusedIds.size > 0;
    
    if (hasFocus) {
        btn.classList.add('is-active'); // 變紅且可按
    } else {
        btn.classList.remove('is-active'); // 變灰且不可按
    }
}
        // ==========================================
        // 4. 雙軸拉條手動拖拉邏輯
        // ==========================================
        let xMinPct = 0, xMaxPct = 100, yMinPct = 0, yMaxPct = 100; 

        function updateXRangeUI() {
            document.getElementById('thumbLeft').style.left = xMinPct + '%';
            document.getElementById('thumbRight').style.left = xMaxPct + '%';
            document.getElementById('rangeActive').style.left = xMinPct + '%';
            document.getElementById('rangeActive').style.width = (xMaxPct - xMinPct) + '%';
            const minIdx = Math.round((xMinPct / 100) * (totalHours - 1));
            const maxIdx = Math.round((xMaxPct / 100) * (totalHours - 1));
            document.getElementById('labelLeft').innerText = fullTimelineLabels[minIdx].split(" ")[1];
            document.getElementById('labelRight').innerText = fullTimelineLabels[maxIdx].split(" ")[1];
            myChart.options.scales.x.min = minIdx;
            myChart.options.scales.x.max = maxIdx;
            myChart.update('none'); 
        }

        function updateYRangeUI() {
            document.getElementById('yThumbBottom').style.bottom = yMinPct + '%';
            document.getElementById('yThumbTop').style.bottom = yMaxPct + '%';
            document.getElementById('yRangeActive').style.bottom = yMinPct + '%';
            document.getElementById('yRangeActive').style.height = (yMaxPct - yMinPct) + '%';
            myChart.options.scales.y.min = globalYMin + (yMinPct / 100) * (globalYMax - globalYMin);
            myChart.options.scales.y.max = globalYMin + (yMaxPct / 100) * (globalYMax - globalYMin);
            myChart.update('none');
        }

        function setupThumb(thumb, isLeft, isX) {
            let isDragging = false;
            thumb.onmousedown = (e) => { isDragging = true; e.preventDefault(); };
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const track = isX ? document.getElementById('rangeTrack') : document.getElementById('yRangeTrack');
                const rect = track.getBoundingClientRect();
                let pos = isX ? ((e.clientX - rect.left) / rect.width) * 100 : 100 - ((e.clientY - rect.top) / rect.height) * 100;
                pos = Math.max(0, Math.min(100, pos));
                if (isX) {
                    if (isLeft) xMinPct = Math.min(pos, xMaxPct - 2); else xMaxPct = Math.max(pos, xMinPct + 2);
                    updateXRangeUI();
                } else {
                    if (isLeft) yMinPct = Math.min(pos, yMaxPct - 2); else yMaxPct = Math.max(pos, yMinPct + 2);
                    updateYRangeUI();
                }
            });
            window.addEventListener('mouseup', () => isDragging = false);
        }

        function setupActiveTrack(trackDiv, isX) {
            let isDragging = false, startClient = 0, startMinPct = 0, startMaxPct = 0;
            trackDiv.onmousedown = (e) => {
                isDragging = true; startClient = isX ? e.clientX : e.clientY;
                startMinPct = isX ? xMinPct : yMinPct; startMaxPct = isX ? xMaxPct : yMaxPct; e.preventDefault();
            };
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const rect = trackDiv.parentElement.getBoundingClientRect();
                let deltaPct = isX ? ((e.clientX - startClient) / rect.width) * 100 : -((e.clientY - startClient) / rect.height) * 100;
                let newMin = startMinPct + deltaPct;
                let newMax = startMaxPct + deltaPct;
                if (newMin < 0) { newMax -= newMin; newMin = 0; }
                if (newMax > 100) { newMin -= (newMax - 100); newMax = 100; }
                if (isX) { xMinPct = newMin; xMaxPct = newMax; updateXRangeUI(); } 
                else { yMinPct = newMin; yMaxPct = newMax; updateYRangeUI(); }
            });
            window.addEventListener('mouseup', () => isDragging = false);
        }

        setupThumb(document.getElementById('thumbLeft'), true, true);
        setupThumb(document.getElementById('thumbRight'), false, true);
        setupThumb(document.getElementById('yThumbBottom'), true, false);
        setupThumb(document.getElementById('yThumbTop'), false, false);
        setupActiveTrack(document.getElementById('rangeActive'), true);
        setupActiveTrack(document.getElementById('yRangeActive'), false);

        document.getElementById('resetZoom').onclick = () => {
            myChart.resetZoom(); xMinPct = 0; xMaxPct = 100; yMinPct = 0; yMaxPct = 100;
            updateXRangeUI(); updateYRangeUI();
        };

        // ==========================================
        // 5. 折疊面板與篩選邏輯 (✨ 面板高光操作優化)
        // ==========================================
        
        // --- 切換配色 ---
        document.getElementById('toggleColorBtn').onclick = (e) => {
            const hiddenIds = new Set();
            myChart.data.datasets.forEach((ds, i) => {
                if (myChart.getDatasetMeta(i).hidden === true || ds.hidden === true) { hiddenIds.add(ds.id); }
            });

            colorMode = colorMode === 'personal' ? 'group' : 'personal';
            e.target.innerText = `切換配色：${colorMode === 'personal' ? '個人色' : '群組色'}`;
            
            const newDatasets = getFilteredDatasets();
            newDatasets.forEach(ds => { if (hiddenIds.has(ds.id)) { ds.hidden = true; } });

            myChart.data.datasets = newDatasets;
            applyFocusStyles(myChart);
            if (document.getElementById('member-sidebar').classList.contains('open')) { updateMemberSidebar(); }
        };

        // --- 成員篩選 ---
        document.getElementById('memberPanelBtn').onclick = () => {
            document.getElementById('group-sidebar').classList.remove('open'); 
            const sidebar = document.getElementById('member-sidebar');
            sidebar.classList.toggle('open'); 
            if (sidebar.classList.contains('open')) updateMemberSidebar();
        };

        function updateMemberSidebar() {
            const listEl = document.getElementById('member-list');
            listEl.innerHTML = '';
            const hasFocus = myChart._focusedIds && myChart._focusedIds.size > 0;

            myChart.data.datasets.forEach((ds, idx) => {
                if (ds._isAux) return; 
                
                const isVisible = !manuallyHiddenIds.has(ds.id); 
                const isFocused = hasFocus && myChart._focusedIds.has(ds.id);
                const isFaded = hasFocus && !isFocused; // 若有高光模式且未被選中

                const item = document.createElement('div');
                item.className = `member-item ${!isVisible ? 'hidden-member' : ''}`;
                
                // 左側 Checkbox (純控制圖表顯示/隱藏)
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.style.cssText = "width:16px;height:16px; margin:0;";
                cb.checked = isVisible;
                cb.onclick = (e) => {
                    e.stopPropagation(); // 阻止事件冒泡觸發高光
                    if (isVisible) { manuallyHiddenIds.add(ds.id); myChart.setDatasetVisibility(idx, false); } 
                    else { manuallyHiddenIds.delete(ds.id); myChart.setDatasetVisibility(idx, true); }
                    myChart.update(); updateMemberSidebar(); 
                };

                // 右側點擊區塊 (控制高光)
                const focusArea = document.createElement('div');
                focusArea.className = 'focus-toggle-area';
                
                // UI 狀態表現
                if (isFocused) {
                    focusArea.style.backgroundColor = '#e7f1ff'; 
                    focusArea.style.fontWeight = 'bold';
                    focusArea.style.color = '#007bff';
                }
                if (isFaded && isVisible) {
                    focusArea.style.opacity = '0.5';
                }

                focusArea.innerHTML = `
                    <img src="${ds.customAvatar}" class="member-avatar-mini" style="border-color: ${ds.originalColor}">
                    <span style="font-size: 13px;">${ds.label}</span>
                `;

                // 點擊觸發/取消高光  
                focusArea.onclick = () => {
                    if (!isVisible) return; 
                    if (!myChart._focusedIds) myChart._focusedIds = new Set();
                    
                    if (myChart._focusedIds.has(ds.id)) {
                        myChart._focusedIds.delete(ds.id);
                    } else {
                        myChart._focusedIds.add(ds.id);
                    }
                    
                    // ✨ 這裡一定要用 myChart，用 chart 會導致找不到變數
                    applyFocusStyles(myChart); 
                    updateFocusBtnUI();
                    updateMemberSidebar();
                };

                item.appendChild(cb);
                item.appendChild(focusArea);
                listEl.appendChild(item);
            });
        }

        // --- 群組篩選 ---
        document.getElementById('groupPanelBtn').onclick = () => {
            document.getElementById('member-sidebar').classList.remove('open'); 
            const sidebar = document.getElementById('group-sidebar');
            sidebar.classList.toggle('open'); 
            if (sidebar.classList.contains('open')) updateGroupSidebar();
        };

        function updateGroupSidebar() {
            const listEl = document.getElementById('group-list');
            listEl.innerHTML = '';
            const groups = [...new Set(CHANNEL_REGISTRY.map(ch => ch.group))];
            
            groups.forEach(g => {
                const isVisible = activeGroups.includes(g);
                const item = document.createElement('div');
                item.className = `member-item ${!isVisible ? 'hidden-member' : ''}`;
                item.style.cursor = 'pointer';
                item.innerHTML = `<input type="checkbox" style="width:16px;height:16px" ${isVisible ? 'checked' : ''}>
                    <div style="width:12px;height:12px;border-radius:50%;background-color:${GROUP_COLORS[g] || '#999'}"></div>
                    <span style="font-size: 13px; flex-grow: 1;">${g}</span>`;
                
                item.onclick = () => { 
                    if (isVisible) activeGroups = activeGroups.filter(x => x !== g); else activeGroups.push(g);
                    myChart.data.datasets = getFilteredDatasets(); 
                    applyFocusStyles(myChart); 
                    updateGroupSidebar();
                    if (document.getElementById('member-sidebar').classList.contains('open')) updateMemberSidebar();
                };
                listEl.appendChild(item);
            });
            document.getElementById('allGroupBtn').innerText = activeGroups.length === groups.length ? "全不選" : "全選";
        }

        document.getElementById('allGroupBtn').onclick = () => {
            const groups = [...new Set(CHANNEL_REGISTRY.map(ch => ch.group))];
            if (activeGroups.length === groups.length) activeGroups = []; else activeGroups = [...groups]; 
            
            myChart.data.datasets = getFilteredDatasets(); 
            applyFocusStyles(myChart); 
            updateGroupSidebar();
            if (document.getElementById('member-sidebar').classList.contains('open')) updateMemberSidebar();
        };

        // 啟動初始化
        updateProgress(totalHours - 1);
        updateXRangeUI();
        updateYRangeUI();

        // ==========================================
        // 6. 將畫布的滾輪事件轉移給 Tooltip 內部容器
        // ==========================================
        document.querySelector('.chart-container').addEventListener('wheel', (e) => {
            const tooltipEl = document.getElementById('custom-tooltip');
            if (tooltipEl.style.opacity === '1') {
                const listContainer = tooltipEl.querySelector('.tooltip-list-container');
                if (listContainer) {
                    const hasScrollbar = listContainer.scrollHeight > listContainer.clientHeight;
                    if (hasScrollbar) {
                        listContainer.scrollTop += e.deltaY;
                        e.preventDefault(); 
                    }
                }
            }
        }, { passive: false });

        // 當視窗大小改變時，強制重新渲染圖表以適應新高度
        window.addEventListener('resize', () => {
            myChart.resize();
        });

        // ==========================================
        // ✨ 新增：右上角浮動「關閉高光」按鈕點擊事件
        // ==========================================
document.getElementById('clearFocusBtn').onclick = function() {
    if (myChart._focusedIds) myChart._focusedIds.clear();
    applyFocusStyles(myChart);
    updateFocusBtnUI(); // ✨ 新增這行
    if (document.getElementById('member-sidebar').classList.contains('open')) { 
        updateMemberSidebar(); 
    }
};


    </script>
</body>
</html>
